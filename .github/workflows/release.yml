name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM build directory
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.build
          key: ${{ runner.os }}-spm-release-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-release-

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "Tag $TAG does not match VERSION file $FILE_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package app
        env:
          NUKKU_VERSION: ${{ steps.version.outputs.version }}
          NUKKU_SIGN_IDENTITY: "-"
        run: |
          ./Scripts/package.sh
          codesign --verify --deep --strict .build/Nukku.app
          ditto -c -k --sequesterRsrc --keepParent .build/Nukku.app .build/Nukku.app.zip
          shasum -a 256 .build/Nukku.app.zip > .build/Nukku.app.zip.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            .build/Nukku.app.zip \
            .build/Nukku.app.zip.sha256 \
            --title "Nukku ${{ steps.version.outputs.version }}" \
            --notes-file CHANGELOG.md

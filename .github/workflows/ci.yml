name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# 计费说明：
#   公开仓库 — 无限制。
#   私有仓库 — macOS runner 10×，免费额度约 200 macOS min/月（~40-66 次/月）。

jobs:
  build-and-test:
    runs-on: macos-26   # macOS 26 Tahoe；如提示 runner 不存在可临时改为 macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM build directory
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # 仅 main 分支推送时打包可运行的 .app，并保留 bundle 结构上传。
      - name: Package release app
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ./Scripts/package.sh
          codesign --verify --deep --strict .build/Nukku.app
          ditto -c -k --sequesterRsrc --keepParent .build/Nukku.app .build/Nukku.app.zip

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Nukku-ad-hoc-${{ github.sha }}
          path: .build/Nukku.app.zip
          retention-days: 90
          if-no-files-found: error
